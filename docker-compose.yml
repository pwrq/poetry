services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poetry-contest-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - poetry-contest-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poetry-contest-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - poetry-contest-net

networks:
  poetry-contest-net:
    name: poetry-contest-net
    driver: bridge
